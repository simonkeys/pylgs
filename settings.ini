[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/fastai/nbdev/blob/master/settings.ini for examples.

### Python library ###
repo = pylgs
branch = main
lib_name = %(repo)s
version = 0.2.0
min_python = 3.12
license = GPLv3
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = pylgs
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True
cell_number = False

### Docs ###
custom_sidebar = True
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = Simon Rochester
author_email = simon.rochester@gmail.com
copyright = 2023 onwards, %(author)s
description = Modeling atomic physics of laser guide stars
keywords = nbdev jupyter notebook python LGS
language = English
status = 3
user = simonkeys

### Optional ###
requirements = fastcore==1.8.12 plum-dispatch==2.5.7 pydash==8.0.5 wrapt==1.17.3 pymor==2025.2.0 scikits-odes==3.1.1 sparse==0.17.0 sympy==1.14.0 xarray==2025.9.1 opt-einsum==3.4.0 einops==0.8.1 matplotlib==3.10.6 plotly==6.3.0 ipywidgets==8.1.7
dev_requirements = nbdev-simonkeys h5netcdf==1.6.4 jupyterlab==4.5.1 kaleido==1.1.0 twine==6.2.0
