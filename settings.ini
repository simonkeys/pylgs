[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/fastai/nbdev/blob/master/settings.ini for examples.

### Python library ###
repo = pylgs
branch = main
lib_name = %(repo)s
version = 0.1.0
min_python = 3.10
license = GPLv3
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = pylgs
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True
cell_number = False

### Docs ###
custom_sidebar = True
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = Simon Rochester
author_email = simon.rochester@gmail.com
copyright = 2023 onwards, %(author)s
description = Modeling atomic physics of laser guide stars
keywords = nbdev jupyter notebook python LGS
language = English
status = 3
user = simonkeys

### Optional ###
requirements = fastcore==1.7.28 plum-dispatch==2.5.6 pydash==8.0.4 wrapt==1.17.0 pymor==2024.2.0 scikits-odes==3.1.0 sparse==0.15.4 sympy==1.13.3 xarray==2025.1.1 opt-einsum==3.4.0 einops==0.8.0 matplotlib==3.10.0 plotly==5.24.1 ipywidgets==8.1.5
dev_requirements = nbdev-simonkeys h5netcdf jupyterlab==4.2.5 kaleido
